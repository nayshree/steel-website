<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 570 420" width="570" height="420">
  <defs>
    <linearGradient id="cs-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#172334"/>
    </linearGradient>
    <linearGradient id="cs-orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8440a"/>
      <stop offset="50%" stop-color="#f55b14"/>
      <stop offset="100%" stop-color="#ff7d40"/>
    </linearGradient>
    <linearGradient id="cs-orangeV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f55b14"/>
      <stop offset="100%" stop-color="#c8440a"/>
    </linearGradient>
    <linearGradient id="cs-bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a3a55"/>
      <stop offset="100%" stop-color="#f55b14"/>
    </linearGradient>
    <linearGradient id="cs-bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a3a55"/>
      <stop offset="100%" stop-color="#f55b14"/>
    </linearGradient>
    <linearGradient id="cs-bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a3a55"/>
      <stop offset="100%" stop-color="#4a90c0"/>
    </linearGradient>
    <radialGradient id="cs-dialBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a2d42"/>
      <stop offset="100%" stop-color="#0d1820"/>
    </radialGradient>
    <radialGradient id="cs-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f55b14" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f55b14" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cs-clip">
      <rect width="570" height="420"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cs-clip)">

    <!-- Background -->
    <rect width="570" height="420" fill="url(#cs-bg)"/>

    <!-- Blueprint grid -->
    <g stroke="#2a4e72" stroke-width="0.5" opacity="0.15">
      <line x1="57"  y1="0" x2="57"  y2="420"/>
      <line x1="114" y1="0" x2="114" y2="420"/>
      <line x1="171" y1="0" x2="171" y2="420"/>
      <line x1="228" y1="0" x2="228" y2="420"/>
      <line x1="285" y1="0" x2="285" y2="420"/>
      <line x1="342" y1="0" x2="342" y2="420"/>
      <line x1="399" y1="0" x2="399" y2="420"/>
      <line x1="456" y1="0" x2="456" y2="420"/>
      <line x1="513" y1="0" x2="513" y2="420"/>
      <line x1="0" y1="42"  x2="570" y2="42"/>
      <line x1="0" y1="84"  x2="570" y2="84"/>
      <line x1="0" y1="126" x2="570" y2="126"/>
      <line x1="0" y1="168" x2="570" y2="168"/>
      <line x1="0" y1="210" x2="570" y2="210"/>
      <line x1="0" y1="252" x2="570" y2="252"/>
      <line x1="0" y1="294" x2="570" y2="294"/>
      <line x1="0" y1="336" x2="570" y2="336"/>
      <line x1="0" y1="378" x2="570" y2="378"/>
    </g>

    <!-- Left orange accent strip -->
    <rect x="0" y="0" width="6" height="420" fill="url(#cs-orangeV)"/>

    <!-- ══════════════════════════════════════
         TOP: QUALITY DIAL (centre of top half)
         ══════════════════════════════════════ -->

    <!-- Outer glow -->
    <circle cx="285" cy="148" r="118" fill="url(#cs-glow)"/>

    <!-- Dial background -->
    <circle cx="285" cy="148" r="100" fill="url(#cs-dialBg)" stroke="#1e3a52" stroke-width="1.5"/>

    <!-- Tick ring – 36 major ticks -->
    <g stroke="#3a5a78" stroke-width="1" opacity="0.6">
      <line x1="285" y1="53"  x2="285" y2="63"  transform="rotate(0   285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(10  285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(20  285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="63"  transform="rotate(30  285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(40  285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(50  285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="63"  transform="rotate(60  285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(70  285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(80  285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="63"  transform="rotate(90  285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(100 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(110 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="63"  transform="rotate(120 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(130 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(140 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="63"  transform="rotate(150 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(160 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(170 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="63"  transform="rotate(180 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(190 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(200 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="63"  transform="rotate(210 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(220 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(230 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="63"  transform="rotate(240 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(250 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(260 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="63"  transform="rotate(270 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(280 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(290 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="63"  transform="rotate(300 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(310 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(320 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="63"  transform="rotate(330 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(340 285 148)"/>
      <line x1="285" y1="53"  x2="285" y2="58"  transform="rotate(350 285 148)"/>
    </g>

    <!-- Orange arc fill: 225° → 315° (bottom 90° is PASS zone) using stroke-dasharray trick -->
    <!-- Full circumference at r=85: 2π×85 ≈ 534 -->
    <!-- We want arc from -135° to +45° (270° sweep = 75% of 534 ≈ 400.5) -->
    <circle cx="285" cy="148" r="85"
            fill="none" stroke="#f55b14" stroke-width="10"
            stroke-dasharray="400 534"
            stroke-dashoffset="0"
            transform="rotate(-225 285 148)"
            stroke-linecap="round" opacity="0.85"/>

    <!-- Inner concentric rings -->
    <circle cx="285" cy="148" r="70" fill="none" stroke="#1e3a52" stroke-width="0.8"/>
    <circle cx="285" cy="148" r="50" fill="none" stroke="#1e3a52" stroke-width="0.8"/>
    <circle cx="285" cy="148" r="28" fill="#0d1520" stroke="#f55b14" stroke-width="1" stroke-opacity="0.5"/>

    <!-- Needle pointing to ~315° (PASS zone, upper-right) -->
    <!-- Needle tip at angle 315° from top = 45° clockwise from right = direction (cos45°, -sin45°) = (0.707, -0.707) -->
    <!-- Needle from center (285,148) pointing to ~315° at length 65 -->
    <line x1="285" y1="148"
          x2="331" y2="102"
          stroke="#f55b14" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Needle centre cap -->
    <circle cx="285" cy="148" r="7" fill="#f55b14"/>
    <circle cx="285" cy="148" r="4" fill="#0d1520"/>

    <!-- PASS label in the orange arc zone -->
    <text x="370" y="105" font-family="'Courier New',monospace" font-size="9"
          fill="#f55b14" font-weight="700" opacity="0.9">PASS</text>

    <!-- Zone labels -->
    <text x="192" y="246" font-family="'Courier New',monospace" font-size="8"
          fill="#506070" text-anchor="middle">FAIL</text>
    <text x="378" y="246" font-family="'Courier New',monospace" font-size="8"
          fill="#506070" text-anchor="middle">PASS</text>

    <!-- Centre text -->
    <text x="285" y="140" font-family="Arial,sans-serif" font-size="11" font-weight="700"
          fill="#ffffff" text-anchor="middle" letter-spacing="1">QUALITY</text>
    <text x="285" y="156" font-family="Arial,sans-serif" font-size="9"
          fill="#8090a0" text-anchor="middle" letter-spacing="2">CERTIFIED</text>

    <!-- Section label top -->
    <text x="285" y="35" font-family="Arial,sans-serif" font-size="9" font-weight="600"
          fill="#f55b14" text-anchor="middle" letter-spacing="2.5">CORE OPERATING STANDARDS</text>
    <line x1="130" y1="39" x2="440" y2="39" stroke="#f55b14" stroke-width="0.6" opacity="0.4"/>

    <!-- ══════════════════════════════════════
         DIVIDER
         ══════════════════════════════════════ -->
    <line x1="18" y1="262" x2="552" y2="262" stroke="#1e3a52" stroke-width="1"/>
    <rect x="0" y="262" width="570" height="1" fill="#f55b14" opacity="0.25"/>

    <!-- ══════════════════════════════════════
         BOTTOM: 3 KEY METRICS + STANDARDS BADGES
         ══════════════════════════════════════ -->

    <!-- Metric 1: Chemical Variance Compliance -->
    <text x="20" y="285" font-family="Arial,sans-serif" font-size="9" font-weight="700"
          letter-spacing="1.5" fill="#f55b14">CHEMICAL VARIANCE COMPLIANCE</text>
    <rect x="20"  y="292" width="370" height="10" rx="2" fill="#0d1e2e"/>
    <rect x="20"  y="292" width="363" height="10" rx="2" fill="url(#cs-bar1)"/>
    <text x="400" y="302" font-family="'Courier New',monospace" font-size="9" fill="#ccd8e4">98.0%</text>

    <!-- Metric 2: Dispatch Readiness -->
    <text x="20" y="323" font-family="Arial,sans-serif" font-size="9" font-weight="700"
          letter-spacing="1.5" fill="#f55b14">DISPATCH READINESS</text>
    <rect x="20"  y="330" width="370" height="10" rx="2" fill="#0d1e2e"/>
    <rect x="20"  y="330" width="355" height="10" rx="2" fill="url(#cs-bar2)"/>
    <text x="400" y="340" font-family="'Courier New',monospace" font-size="9" fill="#ccd8e4">96.0%</text>

    <!-- Metric 3: Mill Certification Coverage -->
    <text x="20" y="361" font-family="Arial,sans-serif" font-size="9" font-weight="700"
          letter-spacing="1.5" fill="#f55b14">MILL CERTIFICATION COVERAGE</text>
    <rect x="20"  y="368" width="370" height="10" rx="2" fill="#0d1e2e"/>
    <rect x="20"  y="368" width="370" height="10" rx="2" fill="url(#cs-bar3)"/>
    <text x="400" y="378" font-family="'Courier New',monospace" font-size="9" fill="#ccd8e4">100%</text>

    <!-- Standards badges row -->
    <!-- Badge 1 -->
    <rect x="20"  y="393" width="88" height="20" rx="2" fill="#0f1e2e" stroke="#f55b14" stroke-width="0.8"/>
    <text x="64"  y="407" font-family="'Courier New',monospace" font-size="8.5"
          fill="#ccd8e4" text-anchor="middle">IS:1570</text>
    <!-- Badge 2 -->
    <rect x="116" y="393" width="108" height="20" rx="2" fill="#0f1e2e" stroke="#f55b14" stroke-width="0.8"/>
    <text x="170" y="407" font-family="'Courier New',monospace" font-size="8.5"
          fill="#ccd8e4" text-anchor="middle">DIN EN ISO 4957</text>
    <!-- Badge 3 -->
    <rect x="232" y="393" width="90" height="20" rx="2" fill="#0f1e2e" stroke="#f55b14" stroke-width="0.8"/>
    <text x="277" y="407" font-family="'Courier New',monospace" font-size="8.5"
          fill="#ccd8e4" text-anchor="middle">ASTM A681</text>
    <!-- Badge 4 -->
    <rect x="330" y="393" width="76" height="20" rx="2" fill="#0f1e2e" stroke="#f55b14" stroke-width="0.8"/>
    <text x="368" y="407" font-family="'Courier New',monospace" font-size="8.5"
          fill="#ccd8e4" text-anchor="middle">BS 4659</text>

    <!-- Auremax brand mark (right side) -->
    <rect x="430" y="270" width="124" height="145" fill="#f55b14" opacity="0.05"/>
    <rect x="430" y="270" width="4"   height="145" fill="url(#cs-orangeV)" opacity="0.8"/>
    <text x="492" y="308" font-family="Arial,sans-serif" font-size="16" font-weight="800"
          fill="#ffffff" text-anchor="middle" letter-spacing="3">AUREMAX</text>
    <line x1="436" y1="316" x2="552" y2="316" stroke="#f55b14" stroke-width="0.7" opacity="0.4"/>
    <text x="492" y="332" font-family="Arial,sans-serif" font-size="7.5"
          fill="#7a90a0" text-anchor="middle" letter-spacing="2">INDUSTRIES</text>

    <line x1="436" y1="350" x2="552" y2="350" stroke="#1e3a52" stroke-width="0.6"/>
    <text x="492" y="366" font-family="Arial,sans-serif" font-size="7.5"
          fill="#5a7080" text-anchor="middle" letter-spacing="1">SPECIAL STEEL</text>
    <text x="492" y="381" font-family="Arial,sans-serif" font-size="7.5"
          fill="#5a7080" text-anchor="middle" letter-spacing="1">SOLUTIONS</text>

    <!-- Bottom orange stripe -->
    <rect x="0" y="413" width="570" height="7" fill="url(#cs-orange)" opacity="0.75"/>

  </g>
</svg>
